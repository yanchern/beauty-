<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>欧洲季度申报税金入口</title>
  <style>
    :root {
      --bg: #efe8dc;
      --paper: #fffaf2;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #d8c9b3;
      --navy: #1f3a5f;
      --teal: #0f766e;
      --amber: #b45309;
      --shadow: 0 26px 60px rgba(79, 55, 17, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.13), transparent 28%),
        radial-gradient(circle at right 16%, rgba(180, 83, 9, 0.14), transparent 26%),
        linear-gradient(180deg, #f8f3ea 0%, var(--bg) 100%);
      padding: 28px 16px 52px;
    }

    .wrap {
      max-width: 1220px;
      margin: 0 auto;
    }

    .hero {
      border-radius: 32px;
      padding: 34px;
      color: #fffdfa;
      background: linear-gradient(135deg, #183153, #0f766e 58%, #b45309);
      box-shadow: var(--shadow);
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 4vw, 54px);
      line-height: 1.04;
    }

    .hero p {
      margin: 0;
      max-width: 820px;
      line-height: 1.8;
      opacity: 0.95;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 22px;
      margin-top: 26px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      border-radius: 28px;
      padding: 22px;
      background: rgba(255, 250, 242, 0.96);
      border: 1px solid rgba(216, 201, 179, 0.96);
      box-shadow: var(--shadow);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(15, 118, 110, 0.32);
      box-shadow: 0 30px 72px rgba(79, 55, 17, 0.18);
    }

    .crest-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 126px;
      margin-bottom: 14px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,.88), rgba(247, 240, 229, .96));
      border: 1px solid rgba(216, 201, 179, 0.84);
    }

    .crest {
      width: 92px;
      height: 92px;
      object-fit: contain;
      filter: drop-shadow(0 10px 16px rgba(24, 49, 83, 0.16));
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--teal), var(--amber));
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .05em;
    }

    .card h2 {
      margin: 12px 0 10px;
      font-size: 28px;
      color: var(--navy);
    }

    .card p {
      margin: 0;
      line-height: 1.78;
      color: var(--muted);
      min-height: 128px;
    }

    .meta {
      margin-top: 18px;
      color: var(--teal);
      font-weight: 700;
    }

    @media (max-width: 760px) {
      .hero, .card {
        border-radius: 22px;
        padding: 20px;
      }

      .card p {
        min-height: 0;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>欧洲季度申报税金入口</h1>
      <p>按国家分别上传销售报告和对应税金逻辑文件，系统会套用该国家已固定的独立计算规则生成 Excel 汇总。当前入口已覆盖法国、西班牙、英国、德国、意大利 5 个国家，并在入口页与国家页直接显示各自国徽。</p>
    </section>

    <section class="grid">
__COUNTRY_CARDS__
    </section>
  </div>
</body>
</html>
